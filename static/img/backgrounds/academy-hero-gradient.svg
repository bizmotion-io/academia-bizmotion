<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-base" x1="960" y1="0" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6FAFF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>

    <radialGradient id="bg-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 560) rotate(90) scale(460 760)">
      <stop offset="0" stop-color="#7FB2FF" stop-opacity="0.4"/>
      <stop offset="0.48" stop-color="#7FB2FF" stop-opacity="0.22"/>
      <stop offset="0.8" stop-color="#7FB2FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7FB2FF" stop-opacity="0"/>
